name: Apps Hunter SA

on:
  schedule:
    - cron: '0 * * * *' # يشتغل كل ساعة
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # إضافة صلاحية الكتابة للمستودع (مهم جداً!)
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests
          pip install google-play-scraper

      - name: Run Apps Hunter
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py

      - name: Save memory (Keep track of sent apps)
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add talal_test.txt
          git commit -m "Update memory: talal_test.txt" || echo "No changes to commit"
          git push
